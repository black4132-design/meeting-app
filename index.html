<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>회의 녹음 · 요약</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="회의록">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4F6EF7">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  --primary:#4F6EF7; --primary-dark:#3A56D4;
  --danger:#EF4444;  --success:#10B981;
  --bg:#F0F2FA; --card:#FFFFFF;
  --border:#E5E7EB; --text:#111827; --muted:#6B7280;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh;
  padding-top:calc(var(--safe-top) + 58px);
  padding-bottom:calc(var(--safe-bottom) + 66px);
}

/* ── Header ── */
header{
  background:var(--primary); color:#fff;
  padding:calc(var(--safe-top) + 11px) 18px 11px;
  position:fixed;top:0;left:0;right:0;z-index:200;
  box-shadow:0 2px 12px rgba(79,110,247,.35);
  display:flex;align-items:center;gap:10px;
}
header h1{font-size:16px;font-weight:700;}
header small{font-size:11px;opacity:.75;display:block;margin-top:1px;}

/* ── Bottom Tab Bar ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:var(--safe-bottom);
  box-shadow:0 -2px 12px rgba(0,0,0,.07);
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;cursor:pointer;
  font-size:10px;font-weight:600;color:var(--muted);
  transition:color .15s;
  gap:3px;
}
.tab-item .tab-icon{font-size:22px;line-height:1;}
.tab-item.active{color:var(--primary);}

/* ── Pages ── */
.page{display:none;}
.page.active{display:block;}

/* ── Install Banner ── */
#install-banner{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;margin:10px 14px 0;border-radius:14px;padding:13px 15px;
  font-size:13px;display:none;align-items:center;gap:10px;
}
#install-banner.show{display:flex;}
#install-banner .text{flex:1;line-height:1.5;}
#install-banner strong{display:block;font-size:14px;margin-bottom:2px;}
#install-banner button{
  background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.5);
  color:#fff;border-radius:8px;padding:6px 12px;
  font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;
}

/* ── Section ── */
.section{
  background:var(--card);margin:12px 14px 0;
  border-radius:16px;padding:16px;
  box-shadow:0 1px 6px rgba(0,0,0,.07);
}
.section-title{
  font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;
}

/* ── Inputs ── */
.row{display:flex;gap:8px;}
.inp{
  flex:1;padding:11px 13px;
  border:1.5px solid var(--border);border-radius:11px;
  font-size:14px;outline:none;transition:border-color .2s;
  -webkit-appearance:none;background:#fff;
}
.inp:focus{border-color:var(--primary);}
.inp.full{width:100%;}
.save-btn{
  padding:11px 16px;background:var(--primary);color:#fff;
  border:none;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;
}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.api-status{margin-top:7px;font-size:12px;color:var(--muted);}
.api-status.ok{color:var(--success);}

/* ── Record ── */
.record-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 0 8px;}
.record-btn{
  width:88px;height:88px;border-radius:50%;
  background:var(--primary);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(79,110,247,.4);transition:transform .1s;
}
.record-btn:active{transform:scale(.91);}
.record-btn.recording{
  background:var(--danger);
  box-shadow:0 6px 20px rgba(239,68,68,.45);
  animation:pulse 1.4s infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 6px 20px rgba(239,68,68,.45);}
  50%{box-shadow:0 6px 32px rgba(239,68,68,.75);}
}
.record-label{margin-top:11px;font-size:13px;color:var(--muted);font-weight:500;}
.timer{
  font-size:26px;font-weight:700;color:var(--danger);
  margin-top:4px;font-variant-numeric:tabular-nums;
  display:none;letter-spacing:1px;
}
.timer.on{display:block;}
.badge{
  margin-top:9px;display:inline-block;
  padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:700;
  background:#E0E7FF;color:var(--primary);
}
.badge.live{background:#FEE2E2;color:var(--danger);}

/* ── Transcript / Summary ── */
#transcript{
  min-height:130px;max-height:220px;overflow-y:auto;
  font-size:14px;line-height:1.75;
  padding:12px;background:#F9FAFB;
  border:1.5px solid var(--border);border-radius:11px;
  white-space:pre-wrap;word-break:break-word;
  outline:none;-webkit-user-select:text;user-select:text;
}
#transcript:focus{border-color:var(--primary);}
#transcript:empty::before{
  content:'🎙️  녹음 버튼을 누르면 음성이 실시간으로 표시됩니다.';
  color:var(--muted);font-size:13px;
}
#summary-box{
  min-height:70px;font-size:14px;line-height:1.8;
  padding:12px;background:#F0FDF4;
  border:1.5px solid #BBF7D0;border-radius:11px;
  white-space:pre-wrap;word-break:break-word;
}
#summary-box:empty::before{content:'AI 요약 버튼을 눌러주세요.';color:var(--muted);font-size:13px;}

/* ── Buttons ── */
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.btn{
  padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;
  border:none;cursor:pointer;transition:opacity .15s;
}
.btn:active{opacity:.75;}
.btn-blue{background:var(--primary);color:#fff;}
.btn-gray{background:#F3F4F6;color:var(--text);}
.btn-red{background:#FEE2E2;color:var(--danger);}
.btn-green{background:#D1FAE5;color:#065F46;}

/* ── Export ── */
.export-row{display:flex;gap:10px;}
.export-btn{
  flex:1;padding:15px 10px;border-radius:13px;
  border:none;cursor:pointer;
  font-size:14px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:opacity .15s;
}
.export-btn:active{opacity:.75;}
.export-btn span{font-size:22px;}
.e-pdf{background:#FEE2E2;color:#B91C1C;}
.e-txt{background:#E5E7EB;color:#374151;}

/* ── Meeting List ── */
.list-header{
  display:flex;align-items:center;justify-content:space-between;
  margin:14px 14px 0;
}
.list-header h2{font-size:15px;font-weight:700;}
.list-count{
  font-size:12px;background:#E0E7FF;color:var(--primary);
  padding:3px 10px;border-radius:12px;font-weight:600;
}

.meeting-card{
  background:var(--card);margin:10px 14px 0;
  border-radius:16px;padding:15px 16px;
  box-shadow:0 1px 6px rgba(0,0,0,.07);
  cursor:pointer;transition:transform .1s,box-shadow .1s;
  position:relative;
}
.meeting-card:active{transform:scale(.98);}
.meeting-card .card-top{display:flex;align-items:flex-start;gap:10px;}
.meeting-card .card-icon{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,#4F6EF7,#7B8FF7);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.meeting-card .card-info{flex:1;min-width:0;}
.meeting-card .card-title{
  font-size:15px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.meeting-card .card-meta{
  font-size:12px;color:var(--muted);margin-top:3px;
}
.meeting-card .card-preview{
  font-size:12px;color:var(--muted);margin-top:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.5;
}
.card-actions{
  display:flex;gap:6px;margin-top:12px;
}
.card-btn{
  flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:600;
  border:none;cursor:pointer;transition:opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.card-btn:active{opacity:.75;}
.cb-open{background:#EEF2FF;color:var(--primary);}
.cb-pdf{background:#FEE2E2;color:#B91C1C;}
.cb-del{background:#F3F4F6;color:var(--muted);}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--muted);
}
.empty-state .empty-icon{font-size:52px;margin-bottom:12px;}
.empty-state p{font-size:14px;line-height:1.6;}

/* ── Detail View ── */
#detail-page .detail-back{
  display:flex;align-items:center;gap:6px;
  color:var(--primary);font-size:14px;font-weight:600;
  margin:14px 14px 0;cursor:pointer;
}
#detail-page .detail-back svg{width:18px;height:18px;}

.detail-meta{
  background:var(--primary);color:#fff;
  margin:10px 14px 0;border-radius:16px;padding:16px;
}
.detail-meta h2{font-size:17px;font-weight:700;margin-bottom:4px;}
.detail-meta p{font-size:12px;opacity:.8;}

.detail-section{margin:10px 14px 0;}
.detail-section-title{
  font-size:12px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.6px;
  margin-bottom:8px;
}
.detail-body{
  background:var(--card);border-radius:14px;padding:14px;
  font-size:13px;line-height:1.8;color:var(--text);
  white-space:pre-wrap;word-break:break-word;
  box-shadow:0 1px 5px rgba(0,0,0,.06);
  max-height:260px;overflow-y:auto;
}
.detail-body.summary-bg{background:#F0FDF4;}

/* ── Search Bar ── */
.search-bar{
  margin:12px 14px 0;position:relative;
}
.search-bar input{
  width:100%;padding:11px 14px 11px 40px;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:14px;outline:none;background:#fff;
  transition:border-color .2s;-webkit-appearance:none;
}
.search-bar input:focus{border-color:var(--primary);}
.search-bar .search-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--muted);font-size:16px;pointer-events:none;
}

/* ── Spinner / Toast ── */
.spinner{
  display:inline-block;width:13px;height:13px;
  border:2px solid rgba(0,128,0,.25);border-top-color:var(--success);
  border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}
#toast{
  position:fixed;bottom:calc(var(--safe-bottom) + 74px);
  left:50%;transform:translateX(-50%);
  background:#1F2937;color:#fff;
  padding:11px 22px;border-radius:22px;font-size:13px;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;
  white-space:nowrap;max-width:90vw;
}
#toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <div style="font-size:22px">🎙️</div>
  <div>
    <h1>회의 녹음 · 요약</h1>
    <small>음성 → 텍스트 → AI 요약 → 문서 출력</small>
  </div>
</header>

<!-- ══ PAGE: 녹음 ══ -->
<div class="page active" id="page-record">

  <div id="install-banner">
    <div class="text">
      <strong>📲 홈 화면에 앱 추가</strong>
      Safari 공유 버튼 → "홈 화면에 추가"
    </div>
    <button onclick="document.getElementById('install-banner').classList.remove('show')">닫기</button>
  </div>

  <!-- API Key -->
  <div class="section">
    <div class="section-title">Claude API 키 (AI 요약용)</div>
    <div class="row">
      <input type="password" id="api-key" class="inp" placeholder="sk-ant-..." autocomplete="off">
      <button class="save-btn" onclick="saveKey()">저장</button>
    </div>
    <div class="api-status" id="key-status">API 키를 저장하면 AI 요약이 활성화됩니다.</div>
  </div>

  <!-- Meeting Meta -->
  <div class="section">
    <div class="section-title">회의 정보</div>
    <div class="meta-grid">
      <input class="inp" type="text" id="meeting-title" placeholder="회의 제목">
      <input class="inp" type="date" id="meeting-date">
    </div>
    <input class="inp full" type="text" id="meeting-participants" placeholder="참석자 (예: 홍길동, 김철수)">
  </div>

  <!-- Record -->
  <div class="section">
    <div class="section-title">녹음</div>
    <div class="record-wrap">
      <button class="record-btn" id="record-btn" onclick="toggleRecording()">
        <svg id="mic-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8"  y1="23" x2="16" y2="23"/>
        </svg>
        <svg id="stop-icon" width="28" height="28" viewBox="0 0 24 24" fill="white" style="display:none">
          <rect x="4" y="4" width="16" height="16" rx="3"/>
        </svg>
      </button>
      <div class="record-label" id="record-label">탭하여 녹음 시작</div>
      <div class="timer" id="timer">00:00</div>
      <div class="badge" id="badge">대기 중</div>
    </div>
  </div>

  <!-- Transcript -->
  <div class="section">
    <div class="section-title">녹취록 <span style="font-weight:400;color:var(--muted);font-size:10px;">직접 편집 가능</span></div>
    <div id="transcript" contenteditable="true" spellcheck="false"></div>
    <div class="btn-row">
      <button class="btn btn-blue" onclick="summarize()">✨ AI 요약</button>
      <button class="btn btn-green" onclick="saveMeeting()">💾 저장</button>
      <button class="btn btn-red"   onclick="clearAll()">🗑 초기화</button>
    </div>
  </div>

  <!-- Summary -->
  <div class="section">
    <div class="section-title">요약 결과</div>
    <div id="summary-box"></div>
  </div>

  <!-- Export -->
  <div class="section">
    <div class="section-title">문서 출력</div>
    <div class="export-row">
      <button class="export-btn e-pdf" onclick="exportPDF()">
        <span>📄</span>PDF 저장
      </button>
      <button class="export-btn e-txt" onclick="exportTXT()">
        <span>📝</span>TXT 저장
      </button>
    </div>
  </div>

</div><!-- /page-record -->


<!-- ══ PAGE: 목록 ══ -->
<div class="page" id="page-list">
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="search" id="search-input" placeholder="회의 제목 검색..." oninput="renderList()">
  </div>
  <div class="list-header">
    <h2>저장된 회의록</h2>
    <span class="list-count" id="list-count">0건</span>
  </div>
  <div id="meeting-list"></div>
</div>


<!-- ══ PAGE: 상세 ══ -->
<div class="page" id="detail-page">
  <div class="detail-back" onclick="showPage('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    목록으로
  </div>
  <div class="detail-meta" id="detail-meta"></div>

  <div class="detail-section">
    <div class="detail-section-title">녹취록</div>
    <div class="detail-body" id="detail-transcript"></div>
  </div>

  <div class="detail-section" style="margin-bottom:14px;">
    <div class="detail-section-title">요약</div>
    <div class="detail-body summary-bg" id="detail-summary"></div>
  </div>

  <div style="margin:0 14px 14px;display:flex;gap:10px;">
    <button class="export-btn e-pdf" style="flex:1;" onclick="exportDetailPDF()">
      <span>📄</span>PDF 저장
    </button>
    <button class="export-btn e-txt" style="flex:1;" onclick="exportDetailTXT()">
      <span>📝</span>TXT 저장
    </button>
  </div>
</div>


<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item active" id="tab-record" onclick="showPage('record')">
    <span class="tab-icon">🎙️</span>녹음
  </div>
  <div class="tab-item" id="tab-list" onclick="showPage('list')">
    <span class="tab-icon">📋</span>회의록 목록
  </div>
</div>

<div id="toast"></div>

<script>
/* ─────────────────────────────
   Service Worker
───────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

/* iOS 설치 배너 */
if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone) {
  document.getElementById('install-banner').classList.add('show');
}

/* ─────────────────────────────
   State
───────────────────────────── */
let recognition=null, isRecording=false;
let timerInterval=null, seconds=0;
let fullTranscript='', interimText='';
let currentDetail=null;

/* ─────────────────────────────
   Init
───────────────────────────── */
const today = new Date();
document.getElementById('meeting-date').value =
  today.getFullYear()+'-'+
  String(today.getMonth()+1).padStart(2,'0')+'-'+
  String(today.getDate()).padStart(2,'0');

const savedKey = localStorage.getItem('claude_api_key');
if (savedKey) {
  document.getElementById('api-key').value = savedKey;
  document.getElementById('key-status').textContent = '✅ 저장된 API 키가 있습니다.';
  document.getElementById('key-status').className = 'api-status ok';
}

/* ─────────────────────────────
   Tab Navigation
───────────────────────────── */
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));

  if (name === 'record') {
    document.getElementById('page-record').classList.add('active');
    document.getElementById('tab-record').classList.add('active');
  } else if (name === 'list') {
    document.getElementById('page-list').classList.add('active');
    document.getElementById('tab-list').classList.add('active');
    renderList();
  } else if (name === 'detail') {
    document.getElementById('detail-page').classList.add('active');
    document.getElementById('tab-list').classList.add('active');
  }
}

/* ─────────────────────────────
   API Key
───────────────────────────── */
function saveKey() {
  const k = document.getElementById('api-key').value.trim();
  if (!k) { toast('API 키를 입력해주세요.'); return; }
  localStorage.setItem('claude_api_key', k);
  document.getElementById('key-status').textContent = '✅ API 키 저장 완료!';
  document.getElementById('key-status').className = 'api-status ok';
  toast('API 키가 저장되었습니다.');
}

/* ─────────────────────────────
   Recording
───────────────────────────── */
function toggleRecording() {
  isRecording ? stopRecording() : startRecording();
}

function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('⚠️ Chrome 브라우저에서 열어주세요.'); return; }

  recognition = new SR();
  recognition.lang='ko-KR'; recognition.continuous=true; recognition.interimResults=true;

  recognition.onresult = e => {
    let interim='';
    for (let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      e.results[i].isFinal ? (fullTranscript+=t+' ') : (interim+=t);
    }
    interimText=interim; render();
  };
  recognition.onerror = e => { if(e.error!=='no-speech') toast('오류: '+e.error); };
  recognition.onend   = () => { if(isRecording) recognition.start(); };
  recognition.start();

  isRecording=true;
  document.getElementById('record-btn').classList.add('recording');
  document.getElementById('mic-icon').style.display='none';
  document.getElementById('stop-icon').style.display='block';
  document.getElementById('record-label').textContent='탭하여 중지';
  document.getElementById('timer').classList.add('on');
  document.getElementById('badge').textContent='🔴 녹음 중';
  document.getElementById('badge').classList.add('live');

  seconds=0;
  timerInterval=setInterval(()=>{
    seconds++;
    document.getElementById('timer').textContent=
      String(Math.floor(seconds/60)).padStart(2,'0')+':'+String(seconds%60).padStart(2,'0');
  },1000);
}

function stopRecording() {
  isRecording=false;
  if(recognition){recognition.onend=null;recognition.stop();}
  clearInterval(timerInterval);
  document.getElementById('record-btn').classList.remove('recording');
  document.getElementById('mic-icon').style.display='block';
  document.getElementById('stop-icon').style.display='none';
  document.getElementById('record-label').textContent='탭하여 녹음 시작';
  document.getElementById('timer').classList.remove('on');
  document.getElementById('badge').textContent='✅ 녹음 완료';
  document.getElementById('badge').classList.remove('live');
  interimText=''; render();
  toast('녹음이 완료되었습니다.');
}

function render() {
  document.getElementById('transcript').textContent=
    fullTranscript+(interimText?'…'+interimText:'');
}

function clearAll() {
  if(!confirm('현재 녹취록과 요약을 모두 지울까요?')) return;
  fullTranscript=''; interimText='';
  document.getElementById('transcript').textContent='';
  document.getElementById('summary-box').textContent='';
  document.getElementById('meeting-title').value='';
  document.getElementById('meeting-participants').value='';
  const t=new Date();
  document.getElementById('meeting-date').value=
    t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
}

/* ─────────────────────────────
   AI 요약
───────────────────────────── */
async function summarize() {
  const key  = localStorage.getItem('claude_api_key') || document.getElementById('api-key').value.trim();
  const text = document.getElementById('transcript').textContent.trim() || fullTranscript.trim();
  if (!text) { toast('녹취록을 먼저 작성해주세요.'); return; }

  const box = document.getElementById('summary-box');
  if (!key) { box.textContent=extractive(text); toast('💡 기본 요약 생성 완료'); return; }

  box.innerHTML='<span class="spinner"></span> AI 요약 중...';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1024,
        messages:[{role:'user',content:
`다음 회의 녹취록을 한국어로 요약해주세요.

형식:
## 핵심 논의 사항
- (3~5줄)

## 결정된 사항
- (결정 내용)

## 액션 아이템
- (담당자: 할 일)

---
${text}`}]
      })
    });
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||res.statusText);}
    const data=await res.json();
    box.textContent=data.content[0].text;
    toast('✅ AI 요약 완료!');
  } catch(e) {
    box.textContent='⚠️ '+e.message+'\n\n'+extractive(text);
  }
}

function extractive(text) {
  const s=text.match(/[^.!?。]+[.!?。]?/g)||[];
  const step=Math.max(1,Math.floor(s.length/5));
  const picks=[];
  for(let i=0;i<s.length;i+=step) picks.push(s[i].trim());
  return '【주요 내용】\n\n'+picks.filter(Boolean).join('\n\n');
}

/* ─────────────────────────────
   회의록 저장 (localStorage)
───────────────────────────── */
function getMeetings() {
  return JSON.parse(localStorage.getItem('meetings')||'[]');
}
function setMeetings(list) {
  localStorage.setItem('meetings', JSON.stringify(list));
}

function saveMeeting() {
  const title      = document.getElementById('meeting-title').value.trim() || '제목 없음';
  const date       = document.getElementById('meeting-date').value.trim();
  const people     = document.getElementById('meeting-participants').value.trim();
  const transcript = document.getElementById('transcript').textContent.trim() || fullTranscript.trim();
  const summary    = document.getElementById('summary-box').textContent.trim();

  if (!transcript) { toast('저장할 녹취록이 없습니다.'); return; }

  const meetings = getMeetings();
  const id = Date.now().toString();

  // 같은 제목+날짜 업데이트 여부 확인
  const existing = meetings.findIndex(m => m.title===title && m.date===date);
  const entry = { id, title, date, people, transcript, summary, savedAt: new Date().toISOString() };

  if (existing >= 0) {
    if (!confirm(`"${title}" 회의록이 이미 있습니다. 덮어쓸까요?`)) return;
    meetings[existing] = { ...entry, id: meetings[existing].id };
  } else {
    meetings.unshift(entry);
  }

  setMeetings(meetings);
  toast('💾 회의록이 저장되었습니다.');
}

/* ─────────────────────────────
   목록 렌더링
───────────────────────────── */
function renderList() {
  const query    = (document.getElementById('search-input').value||'').trim().toLowerCase();
  const meetings = getMeetings();
  const filtered = query
    ? meetings.filter(m => m.title.toLowerCase().includes(query) || (m.people||'').toLowerCase().includes(query))
    : meetings;

  document.getElementById('list-count').textContent = filtered.length + '건';

  const container = document.getElementById('meeting-list');
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${query?'🔍':'📭'}</div>
        <p>${query ? '검색 결과가 없습니다.' : '저장된 회의록이 없습니다.<br>녹음 후 💾 저장 버튼을 눌러주세요.'}</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(m => `
    <div class="meeting-card" onclick="openDetail('${m.id}')">
      <div class="card-top">
        <div class="card-icon">📋</div>
        <div class="card-info">
          <div class="card-title">${escHtml(m.title)}</div>
          <div class="card-meta">
            📅 ${m.date || '날짜 없음'}
            ${m.people ? ' · 👥 '+escHtml(m.people) : ''}
          </div>
        </div>
      </div>
      ${m.summary ? `<div class="card-preview">${escHtml(m.summary.replace(/#{1,3}\s/g,''))}</div>` :
        m.transcript ? `<div class="card-preview">${escHtml(m.transcript.slice(0,100))}…</div>` : ''}
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="card-btn cb-open"  onclick="openDetail('${m.id}')">📖 상세보기</button>
        <button class="card-btn cb-pdf"   onclick="exportCardPDF('${m.id}')">📄 PDF</button>
        <button class="card-btn cb-del"   onclick="deleteMeeting('${m.id}')">🗑 삭제</button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ─────────────────────────────
   상세 보기
───────────────────────────── */
function openDetail(id) {
  const m = getMeetings().find(m=>m.id===id);
  if (!m) return;
  currentDetail = m;

  document.getElementById('detail-meta').innerHTML = `
    <h2>${escHtml(m.title)}</h2>
    <p>📅 ${m.date||''} ${m.people ? '· 👥 '+escHtml(m.people) : ''}</p>
  `;
  document.getElementById('detail-transcript').textContent = m.transcript || '(녹취록 없음)';
  document.getElementById('detail-summary').textContent    = m.summary    || '(요약 없음)';

  showPage('detail');
}

function deleteMeeting(id) {
  const m = getMeetings().find(m=>m.id===id);
  if (!m) return;
  if (!confirm(`"${m.title}" 회의록을 삭제할까요?`)) return;
  setMeetings(getMeetings().filter(m=>m.id!==id));
  toast('삭제되었습니다.');
  renderList();
}

/* ─────────────────────────────
   Export (녹음 페이지)
───────────────────────────── */
function getMeta() {
  return {
    title:  document.getElementById('meeting-title').value.trim() || '회의 기록',
    date:   document.getElementById('meeting-date').value.trim(),
    people: document.getElementById('meeting-participants').value.trim()
  };
}

function exportTXT() {
  const m  = getMeta();
  const tr = document.getElementById('transcript').textContent.trim() || fullTranscript.trim();
  const su = document.getElementById('summary-box').textContent.trim();
  downloadTXT(m, tr, su);
}

function exportPDF() {
  const m  = getMeta();
  const tr = document.getElementById('transcript').textContent.trim() || fullTranscript.trim();
  const su = document.getElementById('summary-box').textContent.trim();
  buildPDF(m, tr, su);
}

/* Export (상세 페이지) */
function exportDetailPDF() {
  if (!currentDetail) return;
  buildPDF({title:currentDetail.title, date:currentDetail.date, people:currentDetail.people},
           currentDetail.transcript, currentDetail.summary);
}
function exportDetailTXT() {
  if (!currentDetail) return;
  downloadTXT({title:currentDetail.title, date:currentDetail.date, people:currentDetail.people},
              currentDetail.transcript, currentDetail.summary);
}

/* Export (목록 카드) */
function exportCardPDF(id) {
  const m = getMeetings().find(m=>m.id===id);
  if (!m) return;
  buildPDF({title:m.title, date:m.date, people:m.people}, m.transcript, m.summary);
}

/* ─────────────────────────────
   PDF / TXT 빌더
───────────────────────────── */
function downloadTXT(m, tr, su) {
  const txt=[
    '══════════════════════════',`  ${m.title}`,'══════════════════════════',
    `날짜: ${m.date}`, m.people?`참석자: ${m.people}`:'',
    '','【녹취록】', tr||'(없음)',
    '','【요약】', su||'(없음)',
    '','생성: '+new Date().toLocaleString('ko-KR')
  ].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
  a.download=`${m.title}_${m.date}.txt`;
  a.click();
  toast('TXT 저장 완료');
}

function buildPDF(m, tr, su) {
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  doc.setFillColor(79,110,247);
  doc.rect(0,0,210,30,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text(m.title||'Meeting Notes',14,13);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  if(m.date)   doc.text('Date: '+m.date,14,21);
  if(m.people) doc.text('Participants: '+m.people,14,26);
  doc.setTextColor(30,30,30);
  let y=40;
  function section(title,body){
    if(y>270){doc.addPage();y=20;}
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(79,110,247);
    doc.text(title,14,y);y+=7;
    doc.setDrawColor(79,110,247);doc.setLineWidth(.3);doc.line(14,y-2,196,y-2);
    doc.setTextColor(40,40,40);doc.setFont('helvetica','normal');doc.setFontSize(10);
    const lines=doc.splitTextToSize(body||'(내용 없음)',182);
    lines.forEach(l=>{if(y>280){doc.addPage();y=20;}doc.text(l,14,y);y+=6;});
    y+=6;
  }
  section('녹취록 (Transcript)',tr);
  section('요약 (Summary)',su);
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);doc.setFontSize(8);doc.setTextColor(160,160,160);
    doc.text(`${m.title} | ${m.date} | ${i}/${pages}`,14,292);
  }
  doc.save(`${(m.title||'meeting')}_${m.date||'nodate'}.pdf`);
  toast('PDF 저장 완료');
}

/* ─────────────────────────────
   Toast
───────────────────────────── */
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2600);
}
</script>
